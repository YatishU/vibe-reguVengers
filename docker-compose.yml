version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: esg_copilot
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_copilot"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ESG Copilot Application
  esg-copilot:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://esg_user:esg_password@postgres:5432/esg_copilot
      - SECRET_KEY=your-secret-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=True
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - esg-copilot
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: 